# ===== Server =====
# Render injects $PORT at runtime. Fall back to 8080 for local dev.
server.port=${PORT:8080}
server.address=0.0.0.0
spring.application.name=student-hub
spring.main.banner-mode=console

# ===== CORS =====
# Allow the Vite dev server (and proxy) plus anything else during development.
# In production restrict this list.
spring.mvc.cors.allowed-origins=*

# ===== MongoDB (optional) =====
# The app falls back to an in-memory store when MongoDB is not reachable.
# These flags make sure the application starts cleanly even if Mongo is offline:
# In production, set MONGODB_URI in Render → Environment to your Atlas SRV string.
# Locally this falls back to a local mongod, and if that's down the app uses the in-memory store.
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/student_db}
spring.data.mongodb.auto-index-creation=false
spring.data.mongodb.repositories.type=auto
spring.autoconfigure.exclude=
management.health.mongo.enabled=false

